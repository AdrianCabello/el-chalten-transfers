<section id="contact" class="contact-section">
  <div class="container">
    <h2 class="section-title">{{ t().contactTitle }}</h2>
    <form
      id="contact-form"
      class="contact-form"
      (ngSubmit)="onSubmit($event)"
    >
      <div class="form-row">
        <label for="contact-name">{{ t().contactName }}</label>
        <input
          id="contact-name"
          type="text"
          name="name"
          class="form-field"
          [(ngModel)]="name"
          required
          minlength="3"
          [placeholder]="t().contactName"
        />
      </div>
      <div class="form-row">
        <label for="contact-email">{{ t().contactEmail }}</label>
        <input
          id="contact-email"
          type="email"
          name="email"
          class="form-field"
          [(ngModel)]="email"
          required
          [placeholder]="t().contactEmail"
        />
      </div>
      <div class="form-row">
        <label for="contact-msg">{{ t().contactMessage }}</label>
        <textarea
          id="contact-msg"
          name="message"
          class="form-field"
          rows="8"
          [(ngModel)]="message"
          required
          [placeholder]="t().contactMessagePlaceholder"
        ></textarea>
      </div>
      @if (statusMessage() === 'success') {
        <p class="form-status form-status-success">{{ t().contactSuccess }}</p>
      }
      @if (statusMessage() === 'error') {
        <p class="form-status form-status-error">{{ t().contactError }}</p>
      }
      <button
        type="submit"
        class="btn-primary btn-submit"
        [disabled]="isSubmitting()"
      >
        {{ isSubmitting() ? t().sending : t().btnSendInquiry }}
      </button>
    </form>
  </div>
</section>
