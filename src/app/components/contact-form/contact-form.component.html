<section id="contact" class="contact-section">
  <div class="container">
    <h2 class="section-title">{{ t().contactTitle }}</h2>
    <div class="contact-form">
      <div class="form-row">
        <label for="contact-name">{{ t().contactName }}</label>
        <input
          pInputText
          id="contact-name"
          type="text"
          [(ngModel)]="name"
          [placeholder]="t().contactName"
          class="contact-input"
        />
      </div>
      <div class="form-row">
        <label for="contact-email">{{ t().contactEmail }}</label>
        <input
          pInputText
          id="contact-email"
          type="email"
          [(ngModel)]="email"
          [placeholder]="t().contactEmail"
          class="contact-input"
        />
      </div>
      <div class="form-row">
        <label for="contact-message">{{ t().contactMessage }}</label>
        <textarea
          pTextarea
          id="contact-message"
          [(ngModel)]="message"
          [placeholder]="t().contactMessagePlaceholder"
          [rows]="5"
          class="contact-input"
        ></textarea>
      </div>
      <a
        [href]="mailtoUrl"
        class="btn-mailto"
      >
        {{ t().btnSendInquiry }}
      </a>
    </div>
  </div>
</section>
