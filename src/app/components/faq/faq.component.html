<section id="faq" class="faq">
  <div class="container">
    <h2 class="section-title">{{ t().faqTitle }}</h2>
    <div class="faq-list">
      @for (item of faqItems; track $index; let i = $index) {
        <div class="faq-item" [class.open]="expanded === i" appScrollReveal [appScrollReveal]="i * 0.06">
          <button type="button" class="faq-question" (click)="toggle(i)" [attr.aria-expanded]="expanded === i">
            <span class="faq-question-text">{{ t()[item.q] }}</span>
            <span class="faq-icon" aria-hidden="true">+</span>
          </button>
          <div class="faq-answer">
            <p>{{ t()[item.a] }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
