<section id="services" class="services">
  <div class="container">
    <h2 class="section-title">{{ t().servicesTitle }}</h2>
    <p class="services-desc">{{ t().servicesDescLine1 }}</p>
    <p class="services-desc">{{ t().servicesDescLine2 }} {{ t().servicesDescLine3 }}</p>
    <p class="services-cta">
      <a [href]="consultUrl" target="_blank" rel="noopener noreferrer" class="consult-link">{{ t().servicesConsultUs }}</a>
      {{ t().servicesConsultUsExtra }}
    </p>
  </div>
</section>
