<section id="why-us" class="why-us">
  <div class="container">
    <h2 class="section-title">{{ t().whyChooseUsTitle }}</h2>
    <div class="features-grid">
      <div class="feature" appScrollReveal [appScrollReveal]="0">
        <div class="feature-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
          </svg>
        </div>
        <h3>{{ t().whyExperience }}</h3>
        <p>{{ t().whyExperienceDesc }}</p>
      </div>
      <div class="feature" appScrollReveal [appScrollReveal]="0.08">
        <div class="feature-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <h3>{{ t().whyLocalDrivers }}</h3>
        <p>{{ t().whyLocalDriversDesc }}</p>
      </div>
      <div class="feature" appScrollReveal [appScrollReveal]="0.16">
        <div class="feature-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="1" y="3" width="15" height="13"/><polygon points="16 8 20 8 23 11 23 16 16 16 16 8"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/>
          </svg>
        </div>
        <h3>{{ t().whyComfortable }}</h3>
        <p>{{ t().whyComfortableDesc }}</p>
      </div>
      <div class="feature" appScrollReveal [appScrollReveal]="0.24">
        <div class="feature-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 22s-8-4.5-8-11.8A8 8 0 0 1 12 2a8 8 0 0 1 8 8.2C20 17.5 12 22 12 22z"/>
          </svg>
        </div>
        <h3>{{ t().whyPrivate }}</h3>
        <p>{{ t().whyPrivateDesc }}</p>
      </div>
    </div>
  </div>
</section>
